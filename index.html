<<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrestaFin</title>

<style>

/* ===== BODY ===== */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg,#2b0fbf,#0a0a2a);
    color:white;
}

/* ===== HEADER ===== */
.header{
    padding:20px;
    font-size:24px;
    font-weight:600;
}

/* ===== ALERTA ===== */
.alerta{
    background:#0b0b1f;
    margin:12px;
    padding:12px;
    border-radius:14px;
    font-size:13px;
    color:#cfcfcf;
}

/* ===== CARD ===== */
.card{
    background:#050517;
    margin:12px;
    padding:16px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* ===== TITULO ===== */
.titulo{
    color:#d946ef;
    font-size:20px;
    margin-bottom:15px;
}

/* ===== GRID ===== */
.grid{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
}

/* ===== TEXTOS ===== */
.label{
    color:#888;
    font-size:13px;
}

.valor{
    color:#d946ef;
    font-weight:600;
    margin-bottom:10px;
}

/* ===== QR ===== */
.qr{
    text-align:center;
}

.qr img{
    width:150px;
    border-radius:10px;
    background:white;
    padding:5px;
    border:2px solid #d946ef;
    animation:pulse 2s infinite;
}

.monto{
    background:linear-gradient(90deg,#a21caf,#d946ef);
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    font-weight:bold;
}

/* ===== TIMER ===== */
.timer-card{
    background:#050517;
    margin:12px;
    padding:16px;
    border-radius:20px;
    text-align:center;
}

.timer{
    font-size:26px;
    color:#d946ef;
    font-weight:bold;
}

/* ===== BOTON ===== */
.boton{
    position:fixed;
    bottom:70px;
    left:12px;
    right:12px;
    background: linear-gradient(90deg,#a21caf,#d946ef);
    text-align:center;
    padding:16px;
    border-radius:30px;
    font-size:16px;
    font-weight:bold;
    box-shadow:0 5px 20px rgba(217,70,239,0.4);
    transition:0.2s;
}

.boton:active{
    transform:scale(0.95);
}

/* ===== MENU ===== */
.menu{
    position:fixed;
    bottom:0;
    width:100%;
    background:#0b0b1f;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

/* ===== RESPONSIVE ===== */
@media (max-width:768px){

    .grid{
        flex-direction:column;
        text-align:center;
    }

    .qr img{
        width:200px;
    }

    .boton{
        bottom:80px;
    }
}

/* ===== ANIMACION ===== */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

.expirado{
    color:red;
}

</style>
</head>

<body>

<div class="header">
    PrestaFin
</div>

<div class="alerta">
    🛡️ Verifica los datos antes de pagar.
</div>

<div class="card">

    <div class="titulo">Información del pago</div>

    <div class="grid">

        <div>
            <p class="label">Deudor</p>
            <p class="valor">emilse luciana amado</p>

            <p class="label">Teléfono</p>
            <p class="valor">2931455144</p>

            <p class="label">C.I.</p>
            <p class="valor">40324709</p>

            <p class="label">Correo</p>
            <p class="valor">emiluamado@gmail.com</p>
        </div>

   <!--  
      
    -->

        
        <div class="qr">
            <p style="color:#d946ef;">Escaneá</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=PAGO-27000">
            <div class="monto">$189.000.00</div>
        </div>

    </div>

</div>

<div class="timer-card">
    <p>Expira en:</p>
    <div class="timer" id="contador">15:00</div>
</div>

<div class="boton" onclick="pagar()">
    Pagar ahora
</div>

<div class="menu">
    <div>🏠</div>
    <div>👤</div>
</div>

<script>

let tiempo = 900;

let intervalo = setInterval(() => {
    let min = Math.floor(tiempo / 60);
    let seg = tiempo % 60;

    document.getElementById("contador").innerText =
        `${min}:${seg < 10 ? '0'+seg : seg}`;

    if(tiempo <= 0){
        clearInterval(intervalo);
        document.getElementById("contador").innerText = "EXPIRADO";
        document.getElementById("contador").classList.add("expirado");
    }

    tiempo--;

}, 1000);

function pagar(){
    if(navigator.vibrate){
        navigator.vibrate(200);
    }

    alert("Redirigiendo al pago...");
}

</script>

</body>
</html>
